version: '3.9'

services:
  saas-finance-dashboard-client:
    container_name: saas-finance-dashboard-client
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev
